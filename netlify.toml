[build]
  command = "npm run build"
  publish = "dist/spa"

[build.environment]
  NPM_FLAGS="--no-frozen-lockfile"
  PNPM_FLAGS="--no-frozen-lockfile"


[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
